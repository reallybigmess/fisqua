# Tests
#
# Runs the full test suite (`npm test` — all three vitest configs:
# Workers pool, node, import) plus the TypeScript type-check.
#
# Triggers on every push to `main`: PRs are gated by preview.yml, but
# a direct push to `main` would otherwise land unverified — this
# workflow closes that gap. It can also be dispatched manually from
# the Actions UI or `gh workflow run tests.yml` to verify any branch
# before opening a PR.
#
# Concurrency is keyed by branch ref so a second run on the same
# branch cancels the in-flight run rather than queueing.
#
# Runner: Ubicloud (`ubicloud-standard-4`, 4 vCPU / 16 GB) — comfortable
# headroom for the Workers vitest pool. Requires the Ubicloud GitHub
# App installed on the account; without it, runs queue indefinitely.
# Bump to `ubicloud-standard-8` if pool cold-starts begin pushing past
# the timeout.
#
# @version v0.4.1

name: Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubicloud-standard-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
