# Preview
#
# Gates every PR to `main`: runs the full test suite (`npm test` — all
# three vitest configs: Workers pool, node, import) and the TypeScript
# type-check. Direct pushes to `main` are gated separately by
# tests.yml.
#
# @version v0.4.1

name: Preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
